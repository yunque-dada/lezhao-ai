<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐造AI - 开学季易拉宝海报</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans SC',sans-serif;background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        
        /* 易拉宝尺寸: 60cm x 160cm = 3:8 比例 */
        .poster{
            width:450px;
            height:1200px;
            background:linear-gradient(180deg,#1e3a8a 0%,#1e40af 50%,#1d4ed8 100%);
            position:relative;
            overflow:hidden;
            border-radius:8px;
            box-shadow:0 20px 60px rgba(0,0,0,0.5)
        }
        
        .poster::before{
            content:'';
            position:absolute;
            top:0;left:0;right:0;bottom:0;
            background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='25'/%3E%3C/g%3E%3C/svg%3E");
        }
        
        .poster::after{
            content:'';
            position:absolute;
            top:-50%;right:-30%;
            width:400px;height:400px;
            background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 70%);
            border-radius:50%;
        }
        
        .poster-inner{
            position:relative;
            z-index:1;
            padding:40px 35px;
            color:white;
            height:100%;
            display:flex;
            flex-direction:column;
            text-align:center
        }
        
        .badge{
            background:linear-gradient(135deg,#f59e0b,#fbbf24);
            color:#1a1a1a;
            font-weight:800;
            padding:10px 30px;
            font-size:1.1rem;
            display:inline-block;
            border-radius:30px;
            margin-bottom:25px;
            box-shadow:0 6px 20px rgba(245,158,11,0.4)
        }
        
        .logo{
            font-size:2rem;
            font-weight:900;
            margin-bottom:20px;
            letter-spacing:6px;
            text-shadow:0 2px 10px rgba(0,0,0,0.3)
        }
        
        .title{
            font-size:3rem;
            font-weight:900;
            margin-bottom:10px;
            line-height:1.15;
            text-shadow:0 4px 15px rgba(0,0,0,0.3)
        }
        
        .subtitle{
            font-size:1.1rem;
            opacity:0.9;
            margin-bottom:25px
        }
        
        .course-icon{
            width:140px;
            height:140px;
            background:rgba(255,255,255,0.12);
            border-radius:24px;
            margin:0 auto 25px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:60px;
            border:2px solid rgba(255,255,255,0.2)
        }
        
        .course-name{
            font-size:1.6rem;
            font-weight:700;
            margin-bottom:20px
        }
        
        .course-desc{
            font-size:0.95rem;
            opacity:0.8;
            line-height:1.7;
            margin-bottom:25px
        }
        
        .price-box{
            background:white;
            border-radius:16px;
            padding:25px 30px;
            margin-bottom:25px
        }
        
        .price-label{
            font-size:1rem;
            color:#64748b;
            margin-bottom:8px
        }
        
        .price{
            font-size:3.2rem;
            font-weight:900;
            color:#1e40af;
            line-height:1
        }
        
        .price span{font-size:1.4rem}
        
        .price-original{
            font-size:0.95rem;
            color:#94a3b8;
            text-decoration:line-through;
            margin-top:6px
        }
        
        .features{
            display:flex;
            justify-content:center;
            gap:12px;
            margin-bottom:25px;
            flex-wrap:wrap
        }
        
        .feature{
            background:rgba(255,255,255,0.12);
            padding:10px 18px;
            border-radius:25px;
            font-size:0.85rem;
            border:1px solid rgba(255,255,255,0.1)
        }
        
        .contact{
            background:rgba(255,255,255,0.08);
            border-radius:12px;
            padding:20px;
            margin-top:auto;
            border:1px solid rgba(255,255,255,0.1)
        }
        
        .contact-title{
            font-size:0.95rem;
            margin-bottom:15px;
            opacity:0.9
        }
        
        .contact-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px
        }
        
        .contact-item{text-align:center}
        
        .contact-label{
            font-size:0.75rem;
            opacity:0.6;
            margin-bottom:4px
        }
        
        .contact-value{
            font-size:0.95rem;
            font-weight:600
        }
        
        .qr-box{
            grid-column:span 2;
            display:flex;
            flex-direction:column;
            align-items:center
        }
        
        .qr-placeholder{
            width:90px;
            height:90px;
            background:white;
            border-radius:8px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#64748b;
            font-size:0.65rem;
            margin-top:5px
        }
        
        .footer{
            margin-top:25px;
            font-size:0.85rem;
            opacity:0.7
        }
        
        /* 打印尺寸注释 */
        .print-note{
            text-align:center;
            color:#666;
            font-size:12px;
            margin-top:20px
        }
    </style>
</head>
<body>
<div class="poster">
<div class="poster-inner">
<div class="badge">🎓 开学季特惠</div>

<div class="logo">乐造AI</div>

<h1 class="title">Scratch<br>图形化编程</h1>
<p class="subtitle">让孩子在玩耍中掌握编程思维</p>

<div class="course-icon">🧊</div>

<div class="course-name">Scratch 图形化编程</div>

<p class="course-desc">
专为6-10岁孩子设计<br>
拖拽式编程，零门槛入门<br>
64课时，20+项目作品<br>
培养计算思维，激发创造力
</p>

<div class="price-box">
<div class="price-label">🎉 开学季一口价</div>
<div class="price"><span>¥</span>1499</div>
<div class="price-original">原价 ¥2999</div>
</div>

<div class="features">
<div class="feature">🎯 8人小班</div>
<div class="feature">👨‍🏫 名师授课</div>
<div class="feature">🏆 竞赛辅导</div>
</div>

<div class="contact">
<div class="contact-title">📮 联系我们</div>
<div class="contact-grid">
<div class="contact-item">
<div class="contact-label">电话</div>
<div class="contact-value">待补充</div>
</div>
<div class="contact-item">
<div class="contact-label">地址</div>
<div class="contact-value">河源市源城区<br>东江首府</div>
</div>
<div class="qr-box">
<div class="contact-label">扫码咨询</div>
<div class="qr-placeholder">二维码<br>待补充</div>
</div>
</div>
</div>

<div class="footer">
让每个孩子都能创造未来
</div>
</div>
</div>

<div class="print-note">
📐 易拉宝尺寸建议: 60cm x 160cm 或 80cm x 200cm
</div>
</body>
</html>
