<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐造AI - 开学季易拉宝</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:微软雅黑, Arial, sans-serif;background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:10px}
        
        /* 易拉宝竖版 - 卡通渐变风格 */
        .poster{
            width:400px;
            height:1000px;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);
            position:relative;
            overflow:hidden;
            border-radius:10px;
            box-shadow:0 15px 50px rgba(0,0,0,0.4)
        }
        
        /* 装饰圆点 */
        .dot{position:absolute;border-radius:50%;opacity:0.3}
        .dot1{width:80px;height:80px;background:#fff;top:-20px;left:-20px}
        .dot2{width:60px;height:60px;background:#ffd700;bottom:100px;right:-10px}
        .dot3{width:40px;height:40px;background:#00ff88;top:200px;right:20px}
        
        /* 星星装饰 */
        .star{position:absolute;color:#fff;font-size:20px;opacity:0.6}
        
        /* 云朵 */
        .cloud{position:absolute;background:rgba(255,255,255,0.2);border-radius:50px}
        
        .poster-inner{
            position:relative;
            z-index:1;
            padding:35px 30px;
            color:white;
            height:100%;
            display:flex;
            flex-direction:column;
            text-align:center
        }
        
        /* 标签 */
        .badge{
            display:inline-block;
            padding:8px 20px;
            background:linear-gradient(135deg,#ff6b6b,#ffa500);
            color:white;
            font-weight:bold;
            font-size:14px;
            border-radius:20px;
            margin-bottom:15px;
            box-shadow:0 4px 15px rgba(255,107,107,0.4)
        }
        
        /* Logo */
        .logo{font-size:1.6rem;font-weight:900;margin-bottom:8px;text-shadow:0 2px 10px rgba(0,0,0,0.2)}
        
        /* 主标题 */
        .title{
            font-size:2.2rem;
            font-weight:900;
            line-height:1.2;
            margin-bottom:8px;
            text-shadow:0 3px 15px rgba(0,0,0,0.2)
        }
        
        .subtitle{font-size:0.95rem;opacity:0.9;margin-bottom:20px}
        
        /* 课程图标 */
        .course-icon{
            width:100px;
            height:100px;
            margin:0 auto 20px;
            background:rgba(255,255,255,0.25);
            border-radius:20px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:45px;
            border:3px solid rgba(255,255,255,0.3)
        }
        
        /* 课程卡片 */
        .course-card{
            background:rgba(255,255,255,0.95);
            border-radius:15px;
            padding:20px;
            margin-bottom:15px;
            box-shadow:0 8px 25px rgba(0,0,0,0.15)
        }
        
        .course-name{
            font-size:1.3rem;
            font-weight:800;
            color:#333;
            margin-bottom:10px
        }
        
        .course-desc{
            font-size:0.8rem;
            color:#666;
            line-height:1.6
        }
        
        /* 价格 */
        .price-area{
            background:linear-gradient(135deg,#ffd700,#ffaa00);
            border-radius:12px;
            padding:15px;
            margin-bottom:15px;
            box-shadow:0 6px 20px rgba(255,170,0,0.4)
        }
        
        .price-label{font-size:0.8rem;color:#333;margin-bottom:5px}
        
        .price{font-size:2.2rem;font-weight:900;color:#fff;text-shadow:0 2px 5px rgba(0,0,0,0.2)}
        .price span{font-size:1.2rem}
        
        .price-original{font-size:0.75rem;color:#666;text-decoration:line-through;margin-top:3px}
        
        /* 特点标签 */
        .tags{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:15px}
        
        .tag{
            padding:6px 12px;
            background:rgba(255,255,255,0.25);
            border-radius:15px;
            font-size:0.75rem;
            border:1px solid rgba(255,255,255,0.3)
        }
        
        /* 联系区域 */
        .contact{
            background:rgba(0,0,0,0.2);
            border-radius:12px;
            padding:15px;
            margin-top:auto
        }
        
        .contact-title{font-size:0.8rem;margin-bottom:12px;opacity:0.8}
        
        .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        
        .contact-item{
            background:rgba(255,255,255,0.15);
            padding:10px;
            border-radius:8px
        }
        
        .contact-label{font-size:0.65rem;opacity:0.7;margin-bottom:3px}
        .contact-value{font-size:0.8rem;font-weight:bold}
        
        .qr-box{grid-column:span 2;padding:10px;background:rgba(255,255,255,0.15);border-radius:8px}
        
        .qr-placeholder{
            width:70px;
            height:70px;
            background:#fff;
            border-radius:8px;
            margin:5px auto 0;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#999;
            font-size:0.6rem
        }
        
        /* 底部 */
        .footer{font-size:0.7rem;opacity:0.7;margin-top:12px}
        
        .print-tip{text-align:center;color:#666;font-size:11px;margin-top:10px}
    </style>
</head>
<body>
<div class="poster">
<div class="dot dot1"></div>
<div class="dot dot2"></div>
<div class="dot dot3"></div>
<span class="star" style="top:50px;left:30px">⭐</span>
<span class="star" style="top:120px;right:40px">✨</span>
<span class="star" style="bottom:200px;left:20px">🌟</span>
<span class="star" style="bottom:150px;right:30px">💫</span>

<div class="poster-inner">
<div class="badge">🎉 开学季特惠</div>
<div class="logo">乐造AI</div>
<div class="title">SCRATCH<br>图形化编程</div>
<div class="subtitle">让孩子在快乐中学习编程</div>

<div class="course-icon">🤖</div>

<div class="course-card">
<div class="course-name">✨ Scratch 少儿编程</div>
<div class="course-desc">
专为6-10岁设计<br>
拖拽式编程 零基础入门<br>
64课时 20+项目作品
</div>
</div>

<div class="price-area">
<div class="price-label">🎁 限时优惠</div>
<div class="price"><span>¥</span>1499</div>
<div class="price-original">原价 ¥2999</div>
</div>

<div class="tags">
<span class="tag">🎯 8人小班</span>
<span class="tag">👨‍🏫 名师授课</span>
<span class="tag">🏆 竞赛辅导</span>
</div>

<div class="contact">
<div class="contact-title">📮 联系我们</div>
<div class="contact-grid">
<div class="contact-item">
<div class="contact-label">电话</div>
<div class="contact-value">待补充</div>
</div>
<div class="contact-item">
<div class="contact-label">地址</div>
<div class="contact-value">河源市源城区<br>东江首府</div>
</div>
<div class="qr-box">
<div class="contact-label">扫码咨询</div>
<div class="qr-placeholder">二维码<br>待补充</div>
</div>
</div>
</div>

<div class="footer">
让每个孩子都能创造未来
</div>
</div>
</div>

<div class="print-tip">📐 易拉宝建议尺寸：60×160cm</div>
</body>
</html>
